name: Release

# Build signed-less desktop bundles and publish them to a GitHub Release.
# Triggers on any tag like `v0.1.0`. You can also run it manually from the
# Actions tab (workflow_dispatch) to produce a draft without tagging.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # MX Bikes is Windows-only, so Windows is the primary artifact.
          - platform: windows-latest
            args: ""
          # macOS (Apple Silicon) build of the cross-platform download/extract UI.
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Frontend reads this at build time (see .env.production).
          VITE_APP_NAME: "MXB App"
          # Sign the updater artifacts so the app can verify self-updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: "MXB App ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}"
          releaseBody: "See the assets below to download and install."
          # Publish straight away (not a draft) so the updater's `latest.json`
          # endpoint (releases/latest) resolves without a manual publish step.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Tauri names bundles like `MXB.App_0.1.0_x64-setup.exe`, which reads as ugly/
  # fishy. Rename the user-facing installers to `MXB-App-<ver>-<arch>.<ext>` and
  # repoint latest.json at them. Signatures live inside latest.json and are over
  # file *content* (unchanged by a rename), so self-update keeps verifying.
  finalize:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename installers + patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"; cd "$work"
          gh release download "$TAG" -R "$REPO" -p latest.json -O latest.json --clobber || true
          for name in $(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[].name'); do
            case "$name" in
              MXB.App_*.exe|MXB.App_*.dmg|MXB.App_*.exe.sig|MXB.App_*.dmg.sig)
                new="$(printf '%s' "$name" | sed -e 's/MXB\.App/MXB-App/' -e 's/_/-/g' -e 's/-setup//')"
                [ "$name" = "$new" ] && continue
                echo "rename: $name -> $new"
                gh release download "$TAG" -R "$REPO" -p "$name" -O "$new" --clobber
                gh release delete-asset "$TAG" "$name" -R "$REPO" -y
                gh release upload "$TAG" "$new" -R "$REPO" --clobber
                [ -f latest.json ] && sed -i "s#${name}#${new}#g" latest.json
                ;;
            esac
          done
          if [ -f latest.json ]; then
            gh release upload "$TAG" latest.json -R "$REPO" --clobber
          fi
